<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Archivo', 'sans-serif'],
          }
        }
      }
    }
  </script>

</head>

<body class="text-[#725349] font-sans bg-[#ffddbd]">

  <!-- WRAPPER WITH BACKGROUND IMAGE -->
  <div
    class="min-h-screen bg-[url('assets/home/mybackground.png')] bg-scroll bg-cover bg-center flex items-center justify-center p-4 md:p-10">

    <!-- OUTER BORDER-->
    <div
      class="w-full max-w-6xl min-h-[80vh] flex flex-col md:flex-row m-5 border-4 border-[#8c6551] rounded-2xl overflow-hidden bg-white/20 backdrop-blur-md shadow-2xl">

      <!-- SIDEBAR -->
      <aside
        class="hidden md:flex justify-center flex-col w-full md:w-1/3 lg:w-1/4 border-b-4 md:border-b-0 md:border-r-4 border-[#8c6551] p-8 ">


        <!-- PROFILE -->
        <div class="flex flex-col items-center text-center ">
          <img src="assets/home/portrait.png" class="w-60 h-70  mb-4">
          <h1 class="text-2xl font-bold text-[#4a372d]">Gabrielle</h1>
          <p class="text-[#5e4a3f] text-sm font-semibold">Future IT Professional <br> Contact </p>
        </div>


      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 p-8 md:p-16">

        <!-- NAV -->
        <nav class="mb-10 border border-4 border-[#8c6551] p-4 rounded-lg">
          <ul class="flex flex-wrap justify-center gap-4 md:justify-start md:gap-10 items-center text-sm">
            <li><a href="index.html" class="hover:text-[#fa94c4] font-bold">Home</a></li>
            <li><a href="about.html" class="hover:text-[#fa94c4] font-bold ">About</a></li>
            <li><a href="certifications.html" class="hover:text-[#fa94c4] font-bold">Certifications</a></li>
            <li><a href="tech-stack.html" class="hover:text-[#fa94c4] font-bold">Tech Stack</a></li>
          </ul>
        </nav>

        <!-- SECTION BORDER BOX -->
        <div class="border border-4 border-[#8c6551] p-6 md:p-10 rounded-lg">

          <h2 class="text-3xl mb-7 hover:text-[#fa94c4] font-bold truncate">Certifications</h2>

          <!-- GRID -->
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-2 gap-6">


            <!-- CERTIFICATION 1-->
            <div class="group rounded-lg border-4 border-dashed border-[#8c6551]">

              <a href="assets/certifications/certword.png" data-lightbox="certifications" class="block overflow-hidden rounded-t-lg">
                <img src="assets/certifications/badgeword.png"
                  class="w-full h-full bg-white/30 backdrop-blur-md object-contain group-hover:scale-105 transition duration-500 cursor-pointer">
              </a>

              <p class="p-2 text-sm font-bold text-center ">
                Microsoft Office Specialist <br> Word Associate
              </p>

            </div>


            <!-- CERTIFICATION 2-->
            <div class="group overflow-hidden rounded-lg border-4 border-dashed border-[#8c6551]">

              <a href="assets/certifications/certppt.png" data-lightbox="certifications" class="block overflow-hidden rounded-t-lg">
                <img src="assets/certifications/badgeppt.png"
                  class="w-full h-full bg-white/30 backdrop-blur-md object-contain group-hover:scale-105 transition duration-500 cursor-pointer">
              </a>

              <p class="p-2 text-sm font-bold text-center">
                Microsoft Office Specialist <br> PowerPoint Associate
              </p>

            </div>

          </div>

        </div>

      </main>

    </div>


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
